name: Daily Portfolio Analysis

on:
  # Three CET-aligned daily runs (UTC times; CET = UTC+1, CEST = UTC+2)
  schedule:
    - cron: '0 5 * * 1-5'      # 06:00 CET / 07:00 CEST — Pre-European open brief
    - cron: '30 16 * * 1-5'    # 17:30 CET / 18:30 CEST — European close + US midday
    - cron: '0 22 * * 1-5'     # 23:00 CET / 00:00 CEST — US close full report (MAIN)

  # Manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full            # Full analysis (stocks + market review)
          - market-only     # Market review only
          - stocks-only     # Individual stock analysis only
          - brief           # Quick briefing (macro + thesis check only)
      force_run:
        description: 'Force run (skip trading day check)'
        required: false
        default: false
        type: boolean

# Concurrency: only one analysis at a time
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    # 添加超时限制，防止任务卡死
    timeout-minutes: 60
    
    steps:
      - name: 随机延迟（避免固定时间访问）
        run: sleep $((RANDOM % 60))  # 随机延迟0-60秒启动
      
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: |
          mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # ==========================================
          # AI 配置
          # ==========================================
          # LITELLM_CONFIG
          LITELLM_CONFIG: ${{ vars.LITELLM_CONFIG || secrets.LITELLM_CONFIG }}
          LITELLM_CONFIG_YAML: ${{ vars.LITELLM_CONFIG_YAML || secrets.LITELLM_CONFIG_YAML }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}

          # Gemini AI（主选）
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}
          GEMINI_REQUEST_DELAY: '3.0'
          
          # AIHubMix（优先于 OPENAI_API_KEY，自动适配 base_url，推荐国内用户）
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}

          # OpenAI 兼容 API（备选）
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}

          # Anthropic / Claude
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}

          # ==========================================
          # 数据源
          # ==========================================
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          
          # ==========================================
          # 搜索服务
          # ==========================================
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          MINIMAX_API_KEYS: ${{ secrets.MINIMAX_API_KEYS }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          SEARXNG_BASE_URLS: ${{ secrets.SEARXNG_BASE_URLS }}
          SEARXNG_PUBLIC_INSTANCES_ENABLED: ${{ vars.SEARXNG_PUBLIC_INSTANCES_ENABLED || secrets.SEARXNG_PUBLIC_INSTANCES_ENABLED }}
          
          # ==========================================
          # 通知渠道（可同时配置多个，全部推送）
          # ==========================================
          
          # 方式一：企业微信 Webhook
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_MSG_TYPE: ${{ vars.WECHAT_MSG_TYPE || secrets.WECHAT_MSG_TYPE || 'markdown' }}
          
          # 方式二：飞书 Webhook
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          
          # 方式三：Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
          
          # 方式四：邮件
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER || secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME || secrets.EMAIL_SENDER_NAME || 'daily_stock_analysis股票分析助手' }}
          
          # 方式五：Pushover
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          
          # 方式六：PushPlus ⬅️ 新增！
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          
          # 方式七：自定义 Webhook（钉钉、Bark、自建服务等）
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          CUSTOM_WEBHOOK_BEARER_TOKEN: ${{ secrets.CUSTOM_WEBHOOK_BEARER_TOKEN }}
          
          # 方式八：Discord
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_MAIN_CHANNEL_ID: ${{ secrets.DISCORD_MAIN_CHANNEL_ID }}
          
          # 方式九：飞书云文档
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_FOLDER_TOKEN: ${{ secrets.FEISHU_FOLDER_TOKEN }}

          # 方式十：AstrBot
          ASTRBOT_URL: ${{ secrets.ASTRBOT_URL }}
          ASTRBOT_TOKEN: ${{ secrets.ASTRBOT_TOKEN }}

          # 方式十一：Server酱3
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}

          # 方式十二：Slack
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

          # ==========================================
          # 自选股配置
          # ==========================================
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || 'AAPL' }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || secrets.MARKET_REVIEW_REGION || 'global' }}
          
          # ==========================================
          # 运行配置 ⬅️ 新增！
          # ==========================================
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}
          SINGLE_STOCK_NOTIFY: ${{ vars.SINGLE_STOCK_NOTIFY || secrets.SINGLE_STOCK_NOTIFY || 'false' }}
          MARKET_REVIEW_ENABLED: ${{ vars.MARKET_REVIEW_ENABLED || secrets.MARKET_REVIEW_ENABLED || 'true' }}
          ANALYSIS_DELAY: ${{ vars.ANALYSIS_DELAY || secrets.ANALYSIS_DELAY || '0' }}
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}
          
          # ==========================================
          # 系统配置
          # ==========================================
          LOG_LEVEL: INFO
          MAX_WORKERS: ${{ vars.MAX_WORKERS || secrets.MAX_WORKERS || '8' }}
          # 筹码分布：默认 false（云端接口不稳定）；需启用时在 Settings → Variables 添加 ENABLE_CHIP_DISTRIBUTION=true
          ENABLE_CHIP_DISTRIBUTION: ${{ vars.ENABLE_CHIP_DISTRIBUTION || secrets.ENABLE_CHIP_DISTRIBUTION || 'false' }}
          # 实时行情数据源优先级（腾讯有量比且稳定，推荐首选）
          # 可选值: tencent, akshare_sina, efinance, akshare_em, tushare
          # 如果有 Tushare Pro 高积分账号，可将 tushare 放在首位
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}
          
        run: |
          # Process LITELLM YAML config file
          if [ -n "$LITELLM_CONFIG_YAML" ] && [ -n "$LITELLM_CONFIG" ]; then
            mkdir -p "$(dirname "$LITELLM_CONFIG")"
            echo "$LITELLM_CONFIG_YAML" > "$LITELLM_CONFIG"
            echo "LITELLM config written to: $LITELLM_CONFIG"
          fi

          # Determine run mode
          # For scheduled runs: detect which CET time slot triggered
          MODE="${{ github.event.inputs.mode || '' }}"
          if [ -z "$MODE" ]; then
            # Scheduled run — determine report mode from UTC hour
            HOUR=$(TZ='UTC' date '+%H')
            MINUTE=$(TZ='UTC' date '+%M')
            CET_TIME=$(TZ='Europe/Amsterdam' date '+%H:%M')
            echo "Scheduled run at UTC ${HOUR}:${MINUTE} (CET ${CET_TIME})"

            if [ "$HOUR" -le 6 ]; then
              MODE="brief"        # 06:00 CET = pre-European open brief
            elif [ "$HOUR" -le 17 ]; then
              MODE="brief"        # 17:30 CET = European close brief
            else
              MODE="full"         # 23:00 CET = US close full report (MAIN)
            fi
            echo "Auto-selected mode: $MODE"
          fi

          echo "=========================================="
          echo "Daily Portfolio Analysis System"
          echo "=========================================="
          echo "Time: $(TZ='Europe/Amsterdam' date '+%Y-%m-%d %H:%M:%S CET')"
          echo "Mode: $MODE"
          echo "Tickers: $STOCK_LIST"
          echo "Report type: $REPORT_TYPE"
          echo ""
          echo "=========================================="
          echo "Configuration Check"
          echo "=========================================="
          echo "[AI]"
          echo "  LiteLLM: $([ -n "$LITELLM_CONFIG" ] || [ -n "$LITELLM_API_KEY" ] || [ -n "$LITELLM_MODEL" ] && echo 'OK' || echo 'MISSING')"
          echo "  Gemini: $([ -n "$GEMINI_API_KEY" ] && echo 'OK' || echo 'MISSING')"
          echo "  OpenAI: $([ -n "$OPENAI_API_KEY" ] && echo 'OK' || echo '-')"
          echo ""
          echo "[Search]"
          echo "  Tavily: $([ -n "$TAVILY_API_KEYS" ] && echo 'OK' || echo '-')"
          echo ""
          echo "[Notifications]"
          echo "  Telegram: $([ -n "$TELEGRAM_BOT_TOKEN" ] && echo 'OK' || echo '-')"
          echo "=========================================="
          echo ""

          # Build CLI args
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
            echo "Force run enabled (skipping trading day check)"
          fi

          # Execute based on mode
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review --report-mode brief $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "brief" ]; then
            python main.py --report-mode brief $FORCE_RUN_ARG
          else
            python main.py --report-mode full $FORCE_RUN_ARG
          fi
      
      - name: Upload analysis reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: Show run results
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "Analysis Complete"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "Generated reports:"
            ls -la reports/
          else
            echo "No report files generated"
          fi
          echo ""
          if ls logs/stock_analysis_*.log 1>/dev/null 2>&1; then
            echo "Recent log (last 30 lines):"
            tail -30 logs/stock_analysis_*.log 2>/dev/null || echo "No logs"
          fi
